name: .NET CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Web/WebRTCSignalingServer.csproj

      - name: Build
        run: dotnet build Web/WebRTCSignalingServer.csproj --configuration Release --no-restore
